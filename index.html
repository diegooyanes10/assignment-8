<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>What Movie Matches Your Personality?</title>

    <!-- Bootstrap CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS file -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- Page Title -->
    <h1 class="text-center mt-4">What Movie Matches Your Personality?</h1>

    <!-- ===================== QUESTION 1 ===================== -->
    <div class="container d-flex justify-content-center">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        
        <!-- Question text -->
        <h4 class="mb-3">1. What sounds like the perfect Friday night?</h4>
        
        <div class="row g-2">
          
          <!-- Answer choice A (1 point) -->
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-points="1">
              A quiet dinner
            </button>
          </div>

          <!-- Answer choice B (2 points) -->
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-points="2">
              Skydiving or racing cars
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- ===================== QUESTION 2 ===================== -->
    <div class="container d-flex justify-content-center">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        
        <h4 class="mb-3">2. What do you value most in a story?</h4>
        
        <div class="row g-2">
          
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-points="1">
              Emotional connection
            </button>
          </div>

          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-points="2">
              Intense action scenes
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- ===================== QUESTION 3 ===================== -->
    <div class="container d-flex justify-content-center">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        
        <h4 class="mb-3">3. Choose a dream vacation:</h4>
        
        <div class="row g-2">
          
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-points="1">
              Paris with someone special
            </button>
          </div>

          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-points="2">
              Climbing Mount Everest
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- Button that triggers the result calculation -->
    <div class="container d-flex justify-content-center">
      <button id="show-result" class="btn btn-success my-4">
        Show Results
      </button>
    </div>    

    <!-- Container where the result will appear -->
    <div class="container d-flex justify-content-center">
      <div id="result-container" class="card p-4 mb-4" style="width: 75%; display: none;">
        <h3>Your Result:</h3>
        <p id="result-text"></p>
      </div>
    </div>

    <!-- Connect JavaScript file -->
    <script src="./js/script.js"></script>

</body>
</html>
